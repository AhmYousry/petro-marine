<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1B2B4B" />
    <meta name="color-scheme" content="light" />

    <title>Petro Marine — Marine Services &amp; Solutions</title>
    <meta
      name="description"
      content="Petromarine delivers world-class marine services across all 12 Egyptian ports — vessel supply, provisions, fresh water, waste removal, ship repair, and inspection, under one trusted partner."
    />

    <!-- ── Fonts: preconnect + non-blocking stylesheet (faster than CSS @import) ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />

    <!-- ── Social / Open Graph ────────────────────────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Petro Marine — Marine Services & Solutions" />
    <meta
      property="og:description"
      content="One trusted partner for vessel supply, repair, provisions, and compliance across every Egyptian port."
    />
    <meta property="og:image" content="/site-logo.png" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
